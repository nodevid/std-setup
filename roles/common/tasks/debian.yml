---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"

- name: Install common packages (Debian)
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Ensure AppArmor is enabled (Debian)
  ansible.builtin.service:
    name: apparmor
    state: started
    enabled: yes
  when:
    - ansible_facts['os_family'] == "Debian"
    - apparmor_enabled | default(true)
  ignore_errors: yes
