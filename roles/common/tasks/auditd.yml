---
- name: Install auditd
  ansible.builtin.package:
    name: "{{ 'audit' if ansible_facts['os_family'] in ['RedHat', 'Rocky'] else 'auditd' }}"
    state: present

- name: Deploy auditd rules
  ansible.builtin.copy:
    content: |
      # Delete existing rules
      -D

      # Buffer Size
      -b 8192

      # Failure Mode (1=print warning, 2=panic)
      -f 1

      # Audit system login/logout events
      -w /var/log/lastlog -p wa -k logins
      -w /var/run/faillock/ -p wa -k logins

      # Audit file access and modification
      -w /etc/passwd -p wa -k identity
      -w /etc/group -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/sudoers -p wa -k identity
      -w /etc/sudoers.d/ -p wa -k identity

      # Audit network configuration changes
      -a always,exit -F arch=b64 -S sethostname -S setdomainname -k network_modifications
      -w /etc/hosts -p wa -k network_modifications
      -w /etc/sysconfig/network -p wa -k network_modifications

      # Audit SSH configuration changes
      -w /etc/ssh/sshd_config -p wa -k sshd_config

      # Audit cron configuration changes
      -w /etc/cron.allow -p wa -k cron
      -w /etc/cron.deny -p wa -k cron
      -w /etc/crontab -p wa -k cron
      -w /var/spool/cron/ -p wa -k cron

      # Audit kernel module loading/unloading
      -w /sbin/insmod -p x -k modules
      -w /sbin/rmmod -p x -k modules
      -w /sbin/modprobe -p x -k modules
      -a always,exit -F arch=b64 -S init_module -S delete_module -k modules

      # Audit privileged commands
      -a always,exit -F path=/usr/bin/passwd -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged
      -a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged
      -a always,exit -F path=/usr/bin/su -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged

      # Audit file system mounts
      -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=4294967295 -k mounts

      # Audit file deletion
      -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -F auid>=1000 -F auid!=4294967295 -k delete

      # Audit system administrator actions (sudo)
      -w /var/log/sudo.log -p wa -k sudo_log

      # Audit system time changes
      -a always,exit -F arch=b64 -S adjtimex -S settimeofday -S clock_settime -k time_change
      -w /etc/localtime -p wa -k time_change

      # Make auditd immutable (requires reboot to change rules)
      -e 2
    dest: /etc/audit/rules.d/hardening.rules
    owner: root
    group: root
    mode: '0600'
  notify: Restart Auditd

- name: Ensure auditd service is enabled and running
  ansible.builtin.service:
    name: "{{ 'auditd' if ansible_facts['os_family'] == 'Debian' else 'auditd' }}"
    state: started
    enabled: yes
