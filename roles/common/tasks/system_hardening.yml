---
- name: Disable IPv6
  when: ipv6_disable | default(true)
  block:
    - name: Disable IPv6 in sysctl (runtime)
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6
        - net.ipv6.conf.lo.disable_ipv6

    - name: Disable IPv6 via grub (persistent)
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX=".*)(")$'
        line: '\1 ipv6.disable=1\2'
        backrefs: yes
      notify: Update Grub
      when: ansible_facts['os_family'] == "Debian"

    - name: Disable IPv6 via grub (RHEL/Rocky persistent)
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX=".*)(")$'
        line: '\1 ipv6.disable=1\2'
        backrefs: yes
      notify: Update Grub
      when: ansible_facts['os_family'] in ["RedHat", "Rocky"]

- name: Disable unused filesystems
  when: disable_unused_filesystems | default(true)
  block:
    - name: Create modprobe config to disable unused filesystems
      ansible.builtin.copy:
        content: |
          {% for fs in unused_filesystems %}
          install {{ fs }} /bin/true
          {% endfor %}
        dest: /etc/modprobe.d/disable-filesystems.conf
        owner: root
        group: root
        mode: '0600'

- name: Harden /tmp partition
  when: harden_tmp_partition | default(true)
  block:
    - name: Set /tmp mount options (if separate partition)
      ansible.posix.mount:
        path: /tmp
        src: "{{ ansible_mounts | selectattr('mount', 'equalto', '/tmp') | map(attribute='device') | first }}"
        fstype: "{{ ansible_mounts | selectattr('mount', 'equalto', '/tmp') | map(attribute='fstype') | first }}"
        opts: "{{ ansible_mounts | selectattr('mount', 'equalto', '/tmp') | map(attribute='options') | first | join(',') }},nodev,nosuid,noexec"
        state: present
      when: ansible_mounts | selectattr('mount', 'equalto', '/tmp') | list | length > 0

- name: Disable core dumps
  when: disable_core_dumps | default(true)
  block:
    - name: Set limits.conf to disable core dumps
      ansible.builtin.lineinfile:
        path: /etc/security/limits.conf
        line: "* hard core 0"
        state: present

    - name: Set sysctl to disable core dumps
      ansible.posix.sysctl:
        name: fs.suid_dumpable
        value: '0'
        state: present
        reload: yes

- name: Set secure permissions on critical files
  ignore_errors: yes
  block:
    - name: Set permissions on world-readable files
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: '0644'
      loop:
        - /etc/passwd
        - /etc/group

    - name: Set permissions on sensitive files
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: '0640'
      loop:
        - /etc/shadow
        - /etc/gshadow

- name: Disable USB storage
  ansible.builtin.copy:
    content: "install usb-storage /bin/true\n"
    dest: /etc/modprobe.d/disable-usb-storage.conf
    owner: root
    group: root
    mode: '0600'

- name: Set warning banner for login
  ansible.builtin.copy:
    content: |
      *******************************************************************************
                          AUTHORIZED ACCESS ONLY
      *******************************************************************************
      This system is restricted to authorized users only. All activities on
      this system are monitored and recorded. Unauthorized access is strictly
      prohibited and will be prosecuted to the full extent of the law.
      *******************************************************************************
    dest: /etc/issue
    owner: root
    group: root
    mode: '0644'

- name: Set warning banner for SSH login
  ansible.builtin.copy:
    content: |
      *******************************************************************************
                          AUTHORIZED ACCESS ONLY
      *******************************************************************************
      This system is restricted to authorized users only. All activities on
      this system are monitored and recorded. Unauthorized access is strictly
      prohibited and will be prosecuted to the full extent of the law.
      *******************************************************************************
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'
