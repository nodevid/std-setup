---
- name: Deploy SSH configuration template
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH

- name: Set SSH port in selinux context (RHEL/Rocky)
  community.general.seport:
    ports: "{{ ssh_port }}"
    proto: tcp
    setype: ssh_port_t
    state: present
  when:
    - ansible_facts['os_family'] in ["RedHat", "Rocky"]
    - selinux_state | default('enforcing') != 'disabled'
  ignore_errors: yes

- name: Allow SSH port in firewall (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
  when: ansible_facts['os_family'] == "Debian"
  notify: Reload UFW

- name: Allow SSH port in firewall (RHEL/Rocky)
  ansible.posix.firewalld:
    port: "{{ ssh_port }}/tcp"
    permanent: yes
    state: enabled
  when: ansible_facts['os_family'] in ["RedHat", "Rocky"]
  notify: Reload Firewalld
