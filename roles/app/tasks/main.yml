---
- name: Create app user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: yes
    create_home: yes
    home: "{{ app_base_dir }}"
    shell: /bin/bash

- name: Create app base directory
  ansible.builtin.file:
    path: "{{ app_base_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'

# Node.js setup
- name: Install Node.js (Debian)
  when:
    - app_type == "nodejs"
    - ansible_facts['os_family'] == "Debian"
  block:
    - name: Download NodeSource setup script
      ansible.builtin.get_url:
        url: "https://deb.nodesource.com/setup_{{ nodejs_version }}.x"
        dest: "/tmp/nodesource_setup_{{ nodejs_version }}.x.sh"
        mode: '0755'
      register: nodesource_download
      failed_when: false

    - name: Run NodeSource setup script
      ansible.builtin.command: bash /tmp/nodesource_setup_{{ nodejs_version }}.x.sh
      args:
        creates: /etc/apt/sources.list.d/nodesource.list
      when: nodesource_download is succeeded
      failed_when: false

    - name: Install Node.js
      ansible.builtin.apt:
        name:
          - nodejs
          - npm
        state: present

- name: Install Node.js (RHEL/Rocky)
  when:
    - app_type == "nodejs"
    - ansible_facts['os_family'] in ["RedHat", "Rocky"]
  block:
    - name: Install Node.js from EPEL
      ansible.builtin.dnf:
        name:
          - nodejs
          - npm
        state: present

- name: Deploy Node.js apps
  when: app_type == "nodejs" and nodejs_apps is defined
  ansible.builtin.include_tasks: deploy_nodejs_app.yml
  loop: "{{ nodejs_apps }}"
  loop_control:
    loop_var: nodejs_app

# Python setup
- name: Install Python
  when: app_type == "python"
  ansible.builtin.package:
    name:
      - "python{{ python_version }}"
      - "python{{ python_version }}-pip"
      - "python{{ python_version }}-venv"
    state: present

- name: Install Python packages
  when: app_type == "python" and python_packages is defined
  ansible.builtin.pip:
    name: "{{ python_packages }}"
    executable: "pip{{ python_version }}"
    state: present

# Java setup
- name: Install Java
  when: app_type == "java"
  ansible.builtin.package:
    name: "{{ java_flavor }}-{{ java_version }}-jdk"
    state: present
