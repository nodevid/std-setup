---
- name: Fail if mysql_root_password is not changed from default
  ansible.builtin.fail:
    msg: "mysql_root_password is still set to 'changeme'. Set vault_mysql_root_password via Ansible Vault or override mysql_root_password in your inventory."
  when: database_type == "mysql" and mysql_root_password == "changeme"

- name: Install MySQL
  ansible.builtin.package:
    name:
      - mysql-server
      - python3-pymysql
    state: "{{ mysql_version }}"
  when: database_type == "mysql"
  notify: Restart MySQL

- name: Install PostgreSQL
  ansible.builtin.package:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-contrib-{{ postgresql_version }}"
      - python3-psycopg2
    state: present
  when: database_type == "postgresql"
  notify: Restart PostgreSQL

- name: Configure MySQL hardening
  when: database_type == "mysql" and database_hardening_enabled
  block:
    - name: Set MySQL root password
      community.mysql.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock
        state: present
      ignore_errors: yes

    - name: Remove anonymous MySQL users
      community.mysql.mysql_user:
        name: ''
        host_all: yes
        state: absent
        login_user: root
        login_password: "{{ mysql_root_password }}"
      ignore_errors: yes

    - name: Remove MySQL test database
      community.mysql.mysql_db:
        name: test
        state: absent
        login_user: root
        login_password: "{{ mysql_root_password }}"
      ignore_errors: yes

    - name: Create MySQL databases
      community.mysql.mysql_db:
        name: "{{ item.name }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"
      loop: "{{ mysql_databases }}"
      when: mysql_databases is defined

    - name: Create MySQL users
      community.mysql.mysql_user:
        name: "{{ item.name }}"
        password: "{{ item.password }}"
        priv: "{{ item.priv | default('*.*:ALL') }}"
        host: "{{ item.host | default('localhost') }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"
      loop: "{{ mysql_users }}"
      when: mysql_users is defined

- name: Configure PostgreSQL hardening
  when: database_type == "postgresql" and database_hardening_enabled
  block:
    - name: Set PostgreSQL listen addresses
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
        regexp: '^listen_addresses'
        line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
      notify: Restart PostgreSQL
      when: ansible_facts['os_family'] == "Debian"

    - name: Create PostgreSQL databases
      community.postgresql.postgresql_db:
        name: "{{ item.name }}"
        state: present
      loop: "{{ postgresql_databases }}"
      when: postgresql_databases is defined
      become: yes
      become_user: postgres

    - name: Create PostgreSQL users
      community.postgresql.postgresql_user:
        name: "{{ item.name }}"
        password: "{{ item.password }}"
        state: present
      loop: "{{ postgresql_users }}"
      when: postgresql_users is defined
      become: yes
      become_user: postgres

- name: Ensure database service is enabled and running
  ansible.builtin.service:
    name: "{{ 'mysql' if database_type == 'mysql' else 'postgresql' }}"
    state: started
    enabled: yes
